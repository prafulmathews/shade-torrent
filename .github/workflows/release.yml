name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Install libtorrent-rasterbar
        run: brew install libtorrent-rasterbar

      - name: Build
        run: |
          xcodebuild \
            -project shade-torrent.xcodeproj \
            -scheme shade-torrent \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION=${{ github.event.inputs.version }} \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Find .app
        id: find_app
        run: |
          APP=$(find build/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "app_path=$APP" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          mkdir dmg_staging
          cp -R "${{ steps.find_app.outputs.app_path }}" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create \
            -volname "shade-torrent" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            shade-torrent.dmg

      - name: Create GitHub release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          files: shade-torrent.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
